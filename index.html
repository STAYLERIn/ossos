<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simulado de Ossos</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>Simulado de Ossos</h1>
        <p id="pageMeta">Carregando...</p>
      </div>
      <div class="score" aria-live="polite">
        <span id="scoreText">0/0</span>
        <span id="scoreLabel">acertos</span>
      </div>
    </header>

    <main class="layout">
      <section class="toolbar" aria-label="Controles do simulado">
        <div class="pager">
          <button id="prevBtn" type="button" title="Página anterior" aria-label="Página anterior">←</button>
          <select id="pageSelect" aria-label="Escolher página"></select>
          <button id="nextBtn" type="button" title="Próxima página" aria-label="Próxima página">→</button>
        </div>
        <div class="actions">
          <button id="checkBtn" type="button">Corrigir página</button>
          <button id="revealBtn" type="button">Revelar gabarito</button>
          <button id="clearBtn" type="button">Limpar página</button>
        </div>
      </section>

      <section class="content">
        <div class="progress-wrap" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="stage-wrap">
          <div id="stage" class="stage" aria-label="Imagem do simulado com campos de resposta">
            <img id="pageImage" alt="">
            <div id="fieldLayer" class="field-layer"></div>
          </div>
        </div>
      </section>
    </main>

    <template id="fieldTemplate">
      <label class="answer-field">
        <span class="field-number"></span>
        <input type="text" autocomplete="off" spellcheck="false">
        <span class="answer-chip"></span>
      </label>
    </template>

    <script src="data/questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
